server {
  listen 443 ssl http2;
  server_name debian13.ispot.cc;

  # Fill these in for your real VPS.
  ssl_certificate /etc/letsencrypt/live/debian13.ispot.cc/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/debian13.ispot.cc/privkey.pem;

  location /netab/android/ {
    alias /var/www/netab/android/;
    autoindex off;

    types {
      application/json json;
      application/vnd.android.package-archive apk;
    }

    add_header Access-Control-Allow-Origin "*" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  location ~ ^/netab/android/.+/latest\.json$ {
    add_header Cache-Control "no-store, max-age=0" always;
  }

  location ~ ^/netab/android/.+/builds/.+\.apk$ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }
}
